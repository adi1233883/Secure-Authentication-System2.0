<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Secure Authentication System</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">&#128274;</div>
        <div class="auth-brand-name">Secure Auth System</div>
      </div>

      <div id="alertBox" class="alert-banner hidden"></div>

      <!-- Step 1: request reset code -->
      <div id="stepRequest">
        <h1 class="auth-title">Forgot your password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset code.</p>

        <form id="requestForm">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="requestBtn">Send reset code</button>
        </form>
      </div>

      <!-- Step 2: enter OTP + new password -->
      <div id="stepReset" class="hidden">
        <h1 class="auth-title">Reset your password</h1>
        <p class="auth-subtitle">Enter the code sent to <strong id="emailDisplay"></strong> and choose a new password.</p>

        <form id="resetForm">
          <div class="form-group">
            <label class="form-label" for="otp">6-digit code</label>
            <input class="form-input mono" type="text" id="otp" name="otp" placeholder="123456" maxlength="6" inputmode="numeric" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="newPassword">New password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="newPassword" name="newPassword" placeholder="Create a strong password" required minlength="8">
              <button type="button" class="input-toggle" id="togglePassword">Show</button>
            </div>
            <div class="strength-meter" id="strengthMeter">
              <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strengthBarFill"></div>
              </div>
              <div class="strength-label-row">
                <span class="strength-label" id="strengthLabel"></span>
                <span class="text-sm text-muted" id="strengthScore"></span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Reset password</button>
        </form>

        <div class="otp-resend">
          Didn't get a code? <button type="button" id="resendBtn">Resend code</button>
        </div>
      </div>

      <div class="auth-footer">
        <a href="index.html">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
