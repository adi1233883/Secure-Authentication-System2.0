<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Secure Authentication System</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">&#128274;</div>
        <div class="auth-brand-name">Secure Auth System</div>
      </div>

      <h1 class="auth-title">Verify your email</h1>
      <p class="auth-subtitle">We've sent a 6-digit code to <strong id="emailDisplay" class="text-primary">your email</strong>. Enter it below to verify your account.</p>

      <div id="alertBox" class="alert-banner hidden"></div>

      <form id="otpForm">
        <div class="otp-boxes" id="otpBoxes">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="0">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="1">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="2">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="3">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="4">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="5">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="verifyBtn">Verify email</button>
      </form>

      <div class="otp-resend">
        Didn't get a code? <button type="button" id="resendBtn">Resend code</button>
      </div>

      <div class="auth-footer">
        <a href="index.html">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
