<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Secure Authentication System</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">&#128274;</div>
        <div class="auth-brand-name">Secure Auth System</div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access your security dashboard.</p>

      <div id="alertBox" class="alert-banner hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-toggle" id="togglePassword">Show</button>
          </div>
        </div>

        <div class="flex justify-between items-center mt-8" style="margin-bottom: 18px;">
          <a href="forgot-password.html" class="text-sm">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign in</button>
      </form>

      <div class="trust-note">&#128272; Secured with encrypted password hashing</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
